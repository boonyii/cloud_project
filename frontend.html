<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Dashboard</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    header {
      background: #111827;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    h1, h2, h3, h4 {
      margin-top: 0;
    }

    h2 {
      font-size: 20px;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font: inherit;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .secondary:hover {
      background: #d1d5db;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .small-btn {
      width: auto;
      padding: 8px 10px;
      margin-top: 10px;
      background: #dc2626;
    }

    .small-btn:hover {
      background: #b91c1c;
    }

    .tag {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 4px 8px;
      border-radius: 999px;
      margin: 4px 6px 0 0;
      font-size: 12px;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
    }

    .recommendation {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .empty {
      color: #6b7280;
      font-style: italic;
    }

    .section-title {
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
      color: #111827;
    }

    .repo-box {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .repo-box p {
      margin: 6px 0;
    }

    .repo-box ul {
      margin-top: 6px;
      padding-left: 18px;
      list-style: disc;
    }

    .repo-box li {
      border: none;
      background: transparent;
      margin-bottom: 4px;
      padding: 0;
    }

    .github-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .github-header h2 {
      margin: 0;
    }

    .inline-btn {
      width: auto;
      margin: 0;
      white-space: nowrap;
    }

    .result-box {
      margin-top: 10px;
      padding: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }

    pre {
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <header>
    <h1>Personal Assistant Dashboard</h1>
    <p>Simple frontend for our project</p>
  </header>

  <div class="container">
    <div class="card recommendation">
      <h2>AI Recommendation</h2>
      <button onclick="loadRecommendation()">Refresh Recommendation</button>
      <div id="recommendationBox" class="muted">No recommendation loaded yet.</div>
    </div>

    <div class="card">
      <h2>Vibe Coding</h2>
      <textarea id="vibeCommand" placeholder="Example: Add a task to finish the cloud report tonight"></textarea>
      <button onclick="runVibeCommand()">Run Vibe Command</button>
      <div id="vibeResult" class="muted">No vibe command run yet.</div>
    </div>

    <div class="card">
      <h2>Tasks</h2>
      <input id="taskTitle" placeholder="Task title" />
      <textarea id="taskDescription" placeholder="Task description"></textarea>
      <select id="taskPriority">
        <option value="medium">Priority: Medium</option>
        <option value="high">Priority: High</option>
        <option value="low">Priority: Low</option>
      </select>
      <input id="taskDeadline" placeholder="Deadline (e.g. 2026-04-10 18:00)" />
      <button onclick="addTask()">Add Task</button>
      <button class="secondary" onclick="loadTasks()">Refresh Tasks</button>
      <ul id="taskList"></ul>
    </div>

    <div class="card">
      <h2>Schedule</h2>
      <input id="eventTitle" placeholder="Event title" />
      <input id="eventDatetime" placeholder="2026-04-03 18:00" />
      <textarea id="eventDescription" placeholder="Event description"></textarea>
      <button onclick="addEvent()">Add Event</button>
      <button class="secondary" onclick="loadSchedule()">Refresh Schedule</button>
      <ul id="scheduleList"></ul>
    </div>

    <div class="card">
      <h2>Trending Topics</h2>
      <button onclick="loadTrends()">Refresh Trends</button>
      <div id="trendList" class="muted">No trends loaded yet.</div>
    </div>

    <div class="card">
      <div class="github-header">
        <h2>GitHub Repos</h2>
        <button id="analyzeAllBtn" class="inline-btn" onclick="analyzeAllRepos()">Analyze All</button>
      </div>
      <input id="githubUsername" placeholder="GitHub username" value="octocat" />
      <button onclick="loadRepos()">Load Repositories</button>
      <div id="repoList"></div>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";
    let currentRepos = [];
    let currentUsername = "";
    let analyzed = false;

    async function apiFetch(path, options = {}) {
      try {
        const res = await fetch(`${API}${path}`, {
          headers: { "Content-Type": "application/json" },
          ...options
        });

        return await res.json();
      } catch (error) {
        return { error: error.message || "Request failed" };
      }
    }

    async function loadTasks() {
      const data = await apiFetch("/tasks");
      const list = document.getElementById("taskList");
      list.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = '<li class="empty">No tasks yet.</li>';
        return;
      }

      data.forEach(task => {
        const li = document.createElement("li");
        li.innerHTML = `
          <strong>${task.title || "Untitled"}</strong><br>
          <span class="muted">${task.description || "No description"}</span><br>
          <span class="tag">${task.status || "pending"}</span>
          <span class="tag">${task.priority || "medium"}</span>
          ${task.deadline ? `<span class="muted"> · Due: ${task.deadline}</span>` : ""}
          <br>
          <button class="small-btn" onclick="deleteTask(${task.id})">Delete</button>
        `;
        list.appendChild(li);
      });
    }

    async function addTask() {
      const title = document.getElementById("taskTitle").value.trim();
      const description = document.getElementById("taskDescription").value.trim();
      const priority = document.getElementById("taskPriority").value;
      const deadline = document.getElementById("taskDeadline").value.trim();

      if (!title) {
        alert("Please enter a task title.");
        return;
      }

      await apiFetch("/tasks", {
        method: "POST",
        body: JSON.stringify({
          title,
          description,
          status: "pending",
          priority,
          deadline: deadline || null
        })
      });

      document.getElementById("taskTitle").value = "";
      document.getElementById("taskDescription").value = "";
      document.getElementById("taskPriority").value = "medium";
      document.getElementById("taskDeadline").value = "";

      loadTasks();
      loadRecommendation();
    }

    async function deleteTask(id) {
      await apiFetch(`/tasks/${id}`, { method: "DELETE" });
      loadTasks();
      loadRecommendation();
    }

    async function loadSchedule() {
      const data = await apiFetch("/schedule");
      const list = document.getElementById("scheduleList");
      list.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = '<li class="empty">No events yet.</li>';
        return;
      }

      data.forEach(event => {
        const li = document.createElement("li");
        li.innerHTML = `
          <strong>${event.title || "Untitled"}</strong><br>
          <span class="muted">${event.datetime || "No date/time"}</span><br>
          <span>${event.description || "No description"}</span>
          <br>
          <button class="small-btn" onclick="deleteEvent(${event.id})">Delete</button>
        `;
        list.appendChild(li);
      });
    }

    async function addEvent() {
      const title = document.getElementById("eventTitle").value.trim();
      const datetime = document.getElementById("eventDatetime").value.trim();
      const description = document.getElementById("eventDescription").value.trim();

      if (!title) {
        alert("Please enter an event title.");
        return;
      }

      await apiFetch("/schedule", {
        method: "POST",
        body: JSON.stringify({
          title,
          datetime,
          description
        })
      });

      document.getElementById("eventTitle").value = "";
      document.getElementById("eventDatetime").value = "";
      document.getElementById("eventDescription").value = "";

      loadSchedule();
      loadRecommendation();
    }

    async function deleteEvent(id) {
      await apiFetch(`/schedule/${id}`, { method: "DELETE" });
      loadSchedule();
      loadRecommendation();
    }

    async function loadTrends() {
      const data = await apiFetch("/trends");
      const box = document.getElementById("trendList");

      if (!data.trending_keywords || data.trending_keywords.length === 0) {
        box.innerHTML = '<div class="empty">No trends available.</div>';
        return;
      }

      const tags = data.trending_keywords
        .map(word => `<span class="tag">${word}</span>`)
        .join(" ");

      const insight = data.insight
        ? `<p class="muted" style="margin-top:10px"><strong>AI Insight:</strong> ${data.insight}</p>`
        : "";

      box.innerHTML = tags + insight;
    }

    function renderRepos(data) {
      const list = document.getElementById("repoList");
      list.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = '<div class="empty">No repositories found.</div>';
        return;
      }

      data.forEach(repo => {
        const techStack = Array.isArray(repo.analysis?.tech_stack)
          ? repo.analysis.tech_stack.map(item => `<span class="tag">${item}</span>`).join(" ")
          : '<span class="muted">No tech stack available.</span>';

        const improvements = Array.isArray(repo.analysis?.improvements) && repo.analysis.improvements.length > 0
          ? `<ul>${repo.analysis.improvements.map(item => `<li>${item}</li>`).join("")}</ul>`
          : '<span class="muted">No improvement suggestions.</span>';

        const repoBox = document.createElement("div");
        repoBox.className = "repo-box";
        repoBox.innerHTML = `
          <h3>${repo.name || "Unnamed repo"}</h3>
          <p class="muted">${repo.description || "No description"}</p>

          <span class="tag">${repo.language || "Unknown language"}</span>
          <span class="tag">⭐ ${repo.stars || 0}</span>

          <div class="section-title">README Preview</div>
          <p class="muted">${repo.readme_excerpt || "No README found."}</p>

          ${analyzed ? `
            <div class="section-title">AI Summary</div>
            <p class="muted">${repo.analysis?.summary || "No AI summary available."}</p>

            <div class="section-title">Tech Stack</div>
            <div>${techStack}</div>

            <div class="section-title">Suggested Improvements</div>
            <div>${improvements}</div>

            <p class="muted">Analysis mode: ${repo.analysis?.mode || "unknown"}</p>
          ` : ""}

          <div class="section-title">Repository Link</div>
          <a href="${repo.url}" target="_blank">Open repository</a>
        `;
        list.appendChild(repoBox);
      });
    }

    async function loadRepos() {
      const username = document.getElementById("githubUsername").value.trim() || "octocat";
      currentUsername = username;
      analyzed = false;

      const analyzeBtn = document.getElementById("analyzeAllBtn");
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = "Analyze All";

      const data = await apiFetch(`/github/repos?username=${encodeURIComponent(username)}`);

      if (data.error) {
        document.getElementById("repoList").innerHTML = `<div class="empty">Error: ${data.error}</div>`;
        currentRepos = [];
        return;
      }

      if (!Array.isArray(data)) {
        currentRepos = [];
        renderRepos([]);
        return;
      }

      currentRepos = data;
      renderRepos(currentRepos);
    }

    async function analyzeAllRepos() {
      const btn = document.getElementById("analyzeAllBtn");

      if (!currentUsername) {
        currentUsername = document.getElementById("githubUsername").value.trim() || "octocat";
      }

      if (!currentUsername) {
        return;
      }

      btn.disabled = true;
      btn.textContent = "Analyzing...";

      const data = await apiFetch(`/github/repos?username=${encodeURIComponent(currentUsername)}&analyze=true`);

      if (data.error) {
        document.getElementById("repoList").innerHTML = `<div class="empty">Error: ${data.error}</div>`;
        btn.disabled = false;
        btn.textContent = "Analyze All";
        return;
      }

      if (Array.isArray(data)) {
        currentRepos = data;
        analyzed = true;
        renderRepos(currentRepos);
      }

      btn.disabled = false;
      btn.textContent = "Analyze All";
    }

    async function loadRecommendation() {
      const data = await apiFetch("/recommendation");
      const box = document.getElementById("recommendationBox");
      const rec = data.recommendation;

      if (!rec) {
        box.innerHTML = "Recommendation unavailable.";
        return;
      }

      box.innerHTML = `
        <p><strong>Focus:</strong> ${rec.focus || "-"}</p>
        <p><strong>Reason:</strong> ${rec.reason || "-"}</p>
        <p><strong>Next steps:</strong></p>
        <ul>
          ${(rec.next_steps || []).map(step => `<li>${step}</li>`).join("")}
        </ul>
        <p class="muted">Mode: ${rec.mode || "unknown"}</p>
      `;
    }

    async function runVibeCommand() {
      const command = document.getElementById("vibeCommand").value.trim();
      const username = document.getElementById("githubUsername").value.trim() || "octocat";
      const box = document.getElementById("vibeResult");

      if (!command) {
        alert("Please enter a command.");
        return;
      }

      box.innerHTML = '<div class="result-box">Running...</div>';

      const data = await apiFetch("/vibe", {
        method: "POST",
        body: JSON.stringify({
          command,
          github_username: username
        })
      });

      if (data.error) {
        box.innerHTML = `<div class="result-box empty">Error: ${data.error}</div>`;
        return;
      }

      box.innerHTML = `
        <div class="result-box">
          <p><strong>Intent:</strong> ${data.parsed_intent || "unknown"}</p>
          <p><strong>Mode:</strong> ${data.mode || "unknown"}</p>
          <p><strong>Message:</strong> ${data.execution?.message || "-"}</p>
          <pre>${JSON.stringify(data.execution?.result || {}, null, 2)}</pre>
        </div>
      `;

      loadTasks();
      loadSchedule();
      loadRecommendation();

      if (data.parsed_intent === "analyze_github") {
        analyzed = true;

        if (Array.isArray(data.execution?.result)) {
          currentRepos = data.execution.result;
          renderRepos(currentRepos);
        } else {
          loadRepos();
        }
      }
    }

    loadTasks();
    loadSchedule();
    loadTrends();
    loadRepos();
    loadRecommendation();
  </script>
</body>
</html>
